<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roll The Dice</title>
    <link rel="stylesheet" href="style.css" />
    <script defer src="game.js"></script>
  </head>

  <body>
    <h1 class="game-title">Roll The Dice</h1>

    <!-- Buttons to roll dice for each player-->
    <div class="score-container">
      <!-- Display current score card for each player-->
      <div id="scoreBoard">
        <div class="playerRow">
          <p class="PlayerOne">Player 1</p>
          <p id="scoreOne">Score : 0</p>
        </div>

        <div class="playerRow">
          <p class="PlayerTwo">Player 2</p>
          <p id="scoreTwo">Score : 0</p>
        </div>

        <div class="playerRow">
          <p class="PlayerThree">Player 3</p>
          <p id="scoreThree">Score : 0</p>
        </div>

        <button type="button" class="btn" id="editName">Edit Names</button>
      </div>

      <!-- Player Dice Section -->

      <div class="game-container">
        <div class="dice">
          <p class="PlayerOne">Player 1</p>
          <button id="btnOne">
            <img id="img1" src="./dice/dice1.png" alt="Dice 1" />
          </button>
        </div>

        <div class="dice">
          <p class="PlayerTwo">Player 2</p>
          <button id="btnTwo">
            <img id="img2" src="./dice/dice2.png" alt="Dice 2" />
          </button>
        </div>

        <div class="dice">
          <p class="PlayerThree">Player 3</p>
          <button id="btnThree">
            <img id="img3" src="./dice/dice3.png" alt="Dice 3" />
          </button>
        </div>
      </div>
    </div>

    <div class="container-bottom">
      <button class="btn" onclick="resetGame()">Reset Score</button>
    </div>
  </body>
</html>
